# ============================================
# TEMPLATE: Enterprise CI Pipeline (Reusable)
# ============================================
# Use this template for ANY language project.
# Change the inputSet values when using it.
#
# Template Type: Pipeline Template
# Can be used across multiple projects.
# ============================================
template:
  name: Enterprise CI Pipeline Template
  identifier: enterprise_ci_pipeline_template
  versionLabel: "1.0.0"
  type: Pipeline
  projectIdentifier: HarnessCICDZerotoHero
  orgIdentifier: default
  tags:
    type: template
    language: any
  spec:
    variables:
      - name: deploy_version
        type: String
        description: "Deploy version (e.g. 1.0.0)"
        value: <+input>
      - name: environment
        type: String
        description: "Select environment"
        value: <+input>.allowedValues(development,testing,staging,production)
      - name: app_name
        type: String
        description: "Application name"
        value: <+input>
      - name: dockerfile_path
        type: String
        description: "Path to Dockerfile"
        value: <+input>
      - name: build_context
        type: String
        description: "Docker build context path"
        value: <+input>
      - name: build_command
        type: String
        description: "Build command (e.g. mvn package, go build, make)"
        value: <+input>
      - name: test_command
        type: String
        description: "Test command (e.g. mvn test, go test, make test)"
        value: <+input>
    properties:
      ci:
        codebase:
          connectorRef: <+input>
          repoName: <+input>
          build: <+input>
    stages:
      # ============================================
      # STAGE 1: Build, Test, Push to Docker Hub
      # ============================================
      - stage:
          name: build-and-push
          identifier: build_and_push
          description: "Build, test, and push to Docker Hub"
          type: CI
          spec:
            cloneCodebase: true
            platform:
              os: Linux
              arch: Amd64
            runtime:
              type: Cloud
              spec: {}
            execution:
              steps:
                # Step 1: Run Tests
                - step:
                    type: Run
                    name: Run Tests
                    identifier: run_tests
                    spec:
                      shell: Sh
                      command: |-
                        echo "=== Running Tests ==="
                        <+pipeline.variables.test_command>
                        echo "=== Tests Passed! ==="

                # Step 2: Build Application
                - step:
                    type: Run
                    name: Build Application
                    identifier: build_app
                    spec:
                      shell: Sh
                      command: |-
                        echo "=== Building Application ==="
                        <+pipeline.variables.build_command>
                        echo "=== Build Successful! ==="

                # Step 3: Push to Docker Hub
                - step:
                    type: BuildAndPushDockerRegistry
                    name: Push to Docker Hub
                    identifier: push_dockerhub
                    spec:
                      connectorRef: <+input>
                      repo: <+variable.docker_username>/<+pipeline.variables.app_name>
                      tags:
                        - <+pipeline.variables.deploy_version>-<+pipeline.variables.environment>
                        - <+pipeline.sequenceId>
                        - latest
                      dockerfile: <+pipeline.variables.dockerfile_path>
                      context: <+pipeline.variables.build_context>

                # Step 4: Verify Push
                - step:
                    type: Run
                    name: Verify Push
                    identifier: verify_push
                    spec:
                      shell: Sh
                      command: |-
                        echo "========================================="
                        echo "  STAGE 1 COMPLETE!"
                        echo "  App: <+pipeline.variables.app_name>"
                        echo "  Version: <+pipeline.variables.deploy_version>"
                        echo "  Environment: <+pipeline.variables.environment>"
                        echo "  Image: <+variable.docker_username>/<+pipeline.variables.app_name>:<+pipeline.variables.deploy_version>-<+pipeline.variables.environment>"
                        echo "========================================="

      # ============================================
      # STAGE 2: Push to Amazon ECR
      # ============================================
      - stage:
          name: push-to-ecr
          identifier: push_to_ecr
          description: "Push to Amazon ECR"
          type: CI
          spec:
            cloneCodebase: true
            platform:
              os: Linux
              arch: Amd64
            runtime:
              type: Cloud
              spec: {}
            execution:
              steps:
                # Step 1: Push to ECR
                - step:
                    type: BuildAndPushECR
                    name: Push to ECR
                    identifier: push_ecr
                    spec:
                      connectorRef: <+input>
                      region: <+input>
                      account: <+input>
                      imageName: <+pipeline.variables.app_name>
                      tags:
                        - <+pipeline.variables.deploy_version>-<+pipeline.variables.environment>
                        - <+pipeline.sequenceId>
                        - latest
                      dockerfile: <+pipeline.variables.dockerfile_path>
                      context: <+pipeline.variables.build_context>

                # Step 2: Verify ECR
                - step:
                    type: Run
                    name: Verify ECR
                    identifier: verify_ecr
                    spec:
                      shell: Sh
                      command: |-
                        echo "========================================="
                        echo "  STAGE 2 COMPLETE!"
                        echo "  ECR Image pushed ✅"
                        echo "  App: <+pipeline.variables.app_name>"
                        echo "  Version: <+pipeline.variables.deploy_version>-<+pipeline.variables.environment>"
                        echo "========================================="

      # ============================================
      # STAGE 3 & 4: Cleanup (Parallel)
      # ============================================
      - parallel:
          - stage:
              name: cleanup-dockerhub
              identifier: cleanup_dockerhub
              description: "Delete Docker Hub repo"
              type: CI
              spec:
                cloneCodebase: false
                platform:
                  os: Linux
                  arch: Amd64
                runtime:
                  type: Cloud
                  spec: {}
                execution:
                  steps:
                    - step:
                        type: Run
                        name: Wait and Delete Docker Hub
                        identifier: delete_dockerhub
                        spec:
                          shell: Sh
                          command: |-
                            echo "=== Waiting 2 minutes ==="
                            sleep 120
                            echo "=== Deleting Docker Hub Repo ==="
                            TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d '{"username":"<+variable.docker_username>","password":"<+secrets.getValue("docker-hub-password")>"}' https://hub.docker.com/v2/users/login/ | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
                            curl -s -X DELETE -H "Authorization: JWT $TOKEN" https://hub.docker.com/v2/repositories/<+variable.docker_username>/<+pipeline.variables.app_name>/
                            echo "✅ Docker Hub repo deleted!"

          - stage:
              name: cleanup-ecr
              identifier: cleanup_ecr
              description: "Delete ECR repo"
              type: CI
              spec:
                cloneCodebase: false
                platform:
                  os: Linux
                  arch: Amd64
                runtime:
                  type: Cloud
                  spec: {}
                execution:
                  steps:
                    - step:
                        type: Run
                        name: Wait and Delete ECR
                        identifier: delete_ecr
                        spec:
                          shell: Sh
                          image: amazon/aws-cli:latest
                          envVariables:
                            AWS_ACCESS_KEY_ID: <+secrets.getValue("aws_access_key_id")>
                            AWS_SECRET_ACCESS_KEY: <+secrets.getValue("aws_secret_access_key")>
                            AWS_DEFAULT_REGION: us-east-1
                          command: |-
                            echo "=== Waiting 2 minutes ==="
                            sleep 120
                            echo "=== Deleting ECR Repo ==="
                            aws ecr batch-delete-image --repository-name <+pipeline.variables.app_name> --image-ids imageTag=<+pipeline.variables.deploy_version>-<+pipeline.variables.environment> imageTag=<+pipeline.sequenceId> imageTag=latest --region us-east-1 || true
                            aws ecr delete-repository --repository-name <+pipeline.variables.app_name> --force --region us-east-1 || true
                            echo "✅ ECR repo deleted!"

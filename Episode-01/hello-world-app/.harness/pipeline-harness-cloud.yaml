# Pipeline 1: Using HARNESS CLOUD (No Delegate Needed - Easiest!)
# Use this when: You don't have a Kubernetes cluster or Delegate installed
pipeline:
  name: HelloWorld-HarnessCloud
  identifier: helloworld_harness_cloud
  projectIdentifier: default_project
  orgIdentifier: default
  tags:
    infra: harness-cloud
  properties:
    ci:
      codebase:
        connectorRef: github_connector
        repoName: hello-world-harness
        build: <+input>
  stages:
    - stage:
        name: Build Hello World
        identifier: build_hello_world
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Build and Run
                  identifier: build_and_run
                  spec:
                    shell: Sh
                    command: |
                      echo "=== Building Hello World (Harness Cloud) ==="
                      echo "Infrastructure: Harness Cloud (Free, No Delegate)"
                      echo ""
                      mvn clean package -q
                      echo ""
                      echo "=== Running the App ==="
                      java -jar target/hello-world-1.0.0.jar
                      echo ""
                      echo "=== Pipeline Success! ==="

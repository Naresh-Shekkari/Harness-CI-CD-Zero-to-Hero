# Pipeline 2: Using KUBERNETES (Delegate Required)
# Use this when: You have a K8s cluster with Harness Delegate installed
pipeline:
  name: HelloWorld-Kubernetes
  identifier: helloworld_kubernetes
  projectIdentifier: default_project
  orgIdentifier: default
  tags:
    infra: kubernetes
  properties:
    ci:
      codebase:
        connectorRef: github_connector
        repoName: hello-world-harness
        build: <+input>
  stages:
    - stage:
        name: Build Hello World
        identifier: build_hello_world
        type: CI
        spec:
          cloneCodebase: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: k8s_connector
              namespace: harness-builds
              automountServiceAccountToken: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Build and Run
                  identifier: build_and_run
                  spec:
                    connectorRef: dockerhub_connector
                    image: maven:3.9-eclipse-temurin-17
                    shell: Sh
                    command: |
                      echo "=== Building Hello World (Kubernetes) ==="
                      echo "Infrastructure: Kubernetes Delegate"
                      echo "Image: maven:3.9-eclipse-temurin-17"
                      echo ""
                      mvn clean package -q
                      echo ""
                      echo "=== Running the App ==="
                      java -jar target/hello-world-1.0.0.jar
                      echo ""
                      echo "=== Pipeline Success! ==="
